<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
  text-align: center;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

#yesBtn {
  background: #ff4081;
  color: white;
}

#noBtn {
  background: white;
  color: black;
  position: relative;
}
</style>
</head>

<body>

<!-- Proposal Video (default visible) -->
<video id="proposalVideo" autoplay muted loop playsinline>
  <source src="proposal.mp4" type="video/mp4">
</video>

<!-- Celebration Video (hidden initially) -->
<video id="celebrationVideo" style="display:none;" loop playsinline>
  <source src="celebration.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
  <h1>Will You Be Mine Forever? ❤️</h1>
  <button id="yesBtn">YES 💍</button>
  <button id="noBtn">NO 😜</button>
</div>

<script>
const proposalVideo = document.getElementById("proposalVideo");
const celebrationVideo = document.getElementById("celebrationVideo");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

// Default state → Proposal video plays
proposalVideo.play().catch(() => {});

// YES condition
yesBtn.addEventListener("click", function() {
    // Stop proposal
    proposalVideo.pause();
    proposalVideo.style.display = "none";

    // Show celebration
    celebrationVideo.style.display = "block";
    celebrationVideo.muted = false;
    celebrationVideo.play();
});

// NO button just moves (does NOT change video)
noBtn.addEventListener("mouseover", function() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
