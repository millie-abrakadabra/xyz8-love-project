<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* Background videos */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Dark overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 1;
}

/* Content */
.content {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

#yesBtn {
  background: #ff4081;
  color: white;
}

#noBtn {
  background: white;
  color: black;
  position: relative;
}

button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- Proposal Video (default visible) -->
<video id="proposalVideo" autoplay muted loop playsinline>
  <source src="proposal.mp4" type="video/mp4">
</video>

<!-- Celebration Video (hidden initially) -->
<video id="celebrationVideo" muted loop playsinline style="display:none;">
  <source src="celebration.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">
  <h1>Will You Be Mine Forever? ❤️</h1>
  <button id="yesBtn">YES 💍</button>
  <button id="noBtn">NO 😜</button>
</div>

<script>
const proposalVideo = document.getElementById("proposalVideo");
const celebrationVideo = document.getElementById("celebrationVideo");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

/* Ensure proposal video plays */
proposalVideo.play().catch(() => {});

/* YES button logic */
yesBtn.addEventListener("click", function() {

  proposalVideo.pause();
  proposalVideo.style.display = "none";

  celebrationVideo.style.display = "block";
  celebrationVideo.muted = false;
  celebrationVideo.currentTime = 0;
  celebrationVideo.play();

  document.querySelector(".content").innerHTML =
    "<h1>Yayyyy ❤️ You made me the happiest person alive!</h1>";
});

/* NO button moves randomly */
noBtn.addEventListener("mouseover", function() {
  const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
  const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
