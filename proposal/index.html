<!DOCTYPE html>
<html>
<head>
<title>For Someone Special 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<body>
<!-- Proposal Background Video -->
<video id="proposalVideo" autoplay muted loop playsinline class="bg-video">
  <source src="proposal.mp4" type="video/mp4">
</video>

<!-- Celebration Background Video -->
<video id="celebrationVideo" muted loop playsinline class="bg-video hidden">
  <source src="celebration.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
</body>


<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

.card {
  background: rgba(255, 255, 255, 0.2);
  padding: 50px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.hidden {
  display: none;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

h1 {
  color: white;
  font-size: 38px;
}

button {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  margin: 15px;
  cursor: pointer;
  transition: 0.3s;
}

#yes {
  background: white;
  color: #7d5b61;
}

#no {
  position: absolute;
  background: #222;
  color: white;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

.heart {
  position: absolute;
  color: white;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">
  <h1>Will you be mine? 💕</h1>
  <button id="yes" onclick="yesClick()">Yes 💖</button>
  <button id="no" onmouseover="moveNo()">No 😜</button>
</div>

<script>
function yesClick() {
  const proposalVideo = document.getElementById("proposalVideo");
  const celebrationVideo = document.getElementById("celebrationVideo");

  proposalVideo.pause();
  proposalVideo.classList.add("hidden");

  celebrationVideo.classList.remove("hidden");
  celebrationVideo.play();
  celebrationVideo.muted = false;

  document.querySelector(".card").innerHTML =
    "<h1>yayy! You just made millie the happiest person alive 💖</h1>";
}

function moveNo() {
  const noBtn = document.getElementById("no");
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  heart.style.animationDuration = Math.random() * 3 + 3 + "s";
  document.body.appendChild(heart);

document.body.addEventListener("click", function () {
  document.getElementById("proposalVideo").muted = false;
});


  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 500);

function startConfetti() {
  for (let i = 0; i < 100; i++) {
    createHeart();
  }
}
</script>

</body>
</html>
